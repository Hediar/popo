spring.application.name=popo-backend

# PostgreSQL ??
spring.datasource.url=jdbc:postgresql://localhost:5432/popo
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA ??
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# data.sql 자동 실행 설정
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# OpenAI 설정 (Spring AI)
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=1000
spring.ai.openai.embedding.options.model=text-embedding-3-small

# CORS - 배포된 프론트엔드 URL (쉼표로 구분, 환경변수로 설정 가능)
# 예: cors.allowed-origins=https://your-frontend.com,https://www.your-frontend.com
# 환경변수 사용: export CORS_ALLOWED_ORIGINS=https://your-frontend.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# Server
server.port=8080

# Logging
logging.file.name=logs/popo-backend.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# 애플리케이션 로그 레벨 (DEBUG로 설정하면 상세 로그 확인 가능)
logging.level.com.example.popobackend=DEBUG
logging.level.com.example.popobackend.controller=DEBUG
logging.level.com.example.popobackend.service=DEBUG
logging.level.com.example.popobackend.repository=DEBUG
logging.level.com.example.popobackend.config=DEBUG

# Spring AI 로그 (OpenAI 호출 확인)
logging.level.org.springframework.ai=DEBUG

# SQL 로그는 기존 설정 유지 (spring.jpa.show-sql=true)
# Hibernate 로그 레벨
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE